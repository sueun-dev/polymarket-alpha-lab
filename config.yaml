bot:
  mode: paper
  scan_interval: 60
  base_currency: USDC
  log_level: INFO

risk:
  max_position_pct: 0.10
  max_daily_loss_pct: 0.05
  max_open_positions: 20
  kelly_fraction: 0.25
  min_edge: 0.05

scanner:
  min_volume: 1000
  min_liquidity: 500
  categories: []

notifications:
  enabled: false
  telegram: false
  discord: false

ai_judge:
  enabled: true
  providers:
    - openai
    - anthropic
  require_consensus: false
  min_confidence: 0.65
  blend_weight: 0.65
  timeout_seconds: 20
  max_output_tokens: 350
  cache_ttl_seconds: 300
  openai_model: gpt-5.4
  openai_reasoning_effort: medium
  anthropic_model: claude-sonnet-4-20250514
  anthropic_version: "2023-06-01"

strategies: {}
